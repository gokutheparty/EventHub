name: EventHub Production CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  db-migrate:
    name: Database Migration Hardening
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Frontend & Prisma Dependencies
        run: npm install

      - name: Run Prisma Database Migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma migrate deploy

  deploy-backend:
    name: Deploy Backend Microservice
    runs-on: ubuntu-latest
    needs: db-migrate
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      # --- EXAMPLE A: Deployment utilizing Railway CLI ---
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy FastAPI Backend via Railway CLI
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: railway up --service EventHub --detach

      # --- EXAMPLE B: Deployment utilizing Render CLI (Alternative) ---
      # - name: Trigger Render Deploy Hook
      #   run: |
      #     curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
